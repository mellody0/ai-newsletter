<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distillation</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px;
      line-height: 1.75;
      color: #111;
      background: #fff;
      padding: 3.5rem 1.5rem 6rem;
    }

    .page {
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Masthead ── */
    h1 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 1.85rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      padding-bottom: 1.1rem;
      border-bottom: 2px solid #111;
    }

    /* Subtitle: *N stories · Curated DATE* */
    h1 + p {
      margin-top: 0.6rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
    }
    h1 + p em { font-style: normal; }

    /* ── Section headers (Today / Top Stories) ── */
    h2 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #aaa;
      margin-top: 2.75rem;
      margin-bottom: 1.1rem;
    }

    /* ── Dividers ── */
    hr {
      border: none;
      border-top: 1px solid #e4e4e4;
      margin: 1.75rem 0;
    }

    /* ── Body text ── */
    p { margin-top: 1rem; }

    /* ── Stories: suppress list decoration; numbers are already in the text ── */
    ol {
      list-style: none;
      padding: 0;
    }
    ol li { margin-top: 0; }
    ol li > p { margin-top: 0; }

    /* ── Links ── */
    a {
      color: inherit;
      text-decoration: underline;
      text-decoration-color: #ccc;
      text-underline-offset: 2px;
      transition: text-decoration-color 0.12s;
    }
    a:hover { text-decoration-color: #111; }

    /* ── Footer line ── */
    .page > p:last-child {
      margin-top: 4rem;
      padding-top: 1.25rem;
      border-top: 1px solid #e4e4e4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      color: #bbb;
    }
    .page > p:last-child em { font-style: normal; }

    /* ── Source citations ── */
    .sources {
      display: block;
      margin-top: 0.4rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 0.68rem;
      font-variant: small-caps;
      letter-spacing: 0.05em;
      color: #bbb;
    }
    .sources a {
      color: #bbb;
      text-decoration: none;
      margin-right: 0.5rem;
    }
    .sources a:hover { color: #111; }
  </style>
</head>
<body>
  <div class="page">
    {{ content|safe }}
  </div>
</body>
</html>
